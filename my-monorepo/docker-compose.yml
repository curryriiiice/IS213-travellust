services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  flight-search-wrapper:
    build:
      context: ./apps/flight-search-wrapper
      dockerfile: Dockerfile
    container_name: flight-search-wrapper
    ports:
      - '5003:5000'
    env_file:
      - .env
    environment:
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  saved-flights:
    build:
      context: ./apps/saved-flights
      dockerfile: Dockerfile
    container_name: saved-flights
    ports:
      - '5004:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SAVED_FLIGHTS_SUPABASE_URL}
      - SUPABASE_KEY=${SAVED_FLIGHTS_SUPABASE_KEY}
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  flight-management:
    build:
      context: ./apps/flight-management
      dockerfile: Dockerfile
    container_name: flight-management
    ports:
      - '5005:5000'
    env_file:
      - .env
    environment:
      - SEARCH_WRAPPER_HOST=flight-search-wrapper
      - SEARCH_WRAPPER_PORT=5000
      - SAVED_FLIGHTS_HOST=saved-flights
      - SAVED_FLIGHTS_PORT=5000
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      flight-search-wrapper:
        condition: service_healthy
      saved-flights:
        condition: service_healthy

  trips_atomic:
    build:
      context: ./apps/trips_atomic
      dockerfile: Dockerfile
    ports:
      - '5001:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${TRIPS_SUPABASE_URL}
      - SUPABASE_KEY=${TRIPS_SUPABASE_KEY}

  attractions:
    build:
      context: ./apps/attractions
      dockerfile: Dockerfile
    ports:
      - '5002:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${ATTRACTIONS_SUPABASE_URL}
      - SUPABASE_KEY=${ATTRACTIONS_SUPABASE_KEY}

  hotel-search-wrapper:
    build:
      context: ./apps/hotel-management
      dockerfile: Dockerfile
    ports:
      - '5007:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${HOTELS_SUPABASE_URL}
      - SUPABASE_KEY=${HOTELS_SUPABASE_KEY}
    command:
      [
        'python',
        '-m',
        'flask',
        '--app',
        'hotel_management.hotel_search_wrapper_app',
        'run',
        '--host=0.0.0.0',
      ]

  saved-hotels:
    build:
      context: ./apps/hotel-management
      dockerfile: Dockerfile
    ports:
      - '5008:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${HOTELS_SUPABASE_URL}
      - SUPABASE_KEY=${HOTELS_SUPABASE_KEY}
    command:
      [
        'python',
        '-m',
        'flask',
        '--app',
        'hotel_management.saved_hotels_app',
        'run',
        '--host=0.0.0.0',
      ]

  hotel-management:
    build:
      context: ./apps/hotel-management
      dockerfile: Dockerfile
    ports:
      - '5009:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${HOTELS_SUPABASE_URL}
      - SUPABASE_KEY=${HOTELS_SUPABASE_KEY}
    command:
      [
        'python',
        '-m',
        'flask',
        '--app',
        'hotel_management.hotel_management_app',
        'run',
        '--host=0.0.0.0',
      ]

  booked_tickets:
    build:
      context: ./apps/booked_tickets
      dockerfile: Dockerfile
    ports:
      - '5006:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${BOOKED_TICKETS_SUPABASE_URL}
      - SUPABASE_KEY=${BOOKED_TICKETS_SUPABASE_KEY}

  collaboration_service:
    build:
      context: ./apps/collaboration_service
      dockerfile: Dockerfile
    container_name: collaboration_service
    ports:
      - '5010:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${TRIPS_SUPABASE_URL}
      - SUPABASE_KEY=${TRIPS_SUPABASE_KEY}
      - PORT=5000
    depends_on:
      - redis

  plan:
    build:
      context: ./apps/plan_service
      dockerfile: Dockerfile
    container_name: plan
    ports:
      - '5011:5000'
    env_file:
      - .env
    environment:
      - FLIGHT_MANAGEMENT_HOST=flight-management
      - FLIGHT_MANAGEMENT_PORT=5000
      - HOTEL_MANAGEMENT_HOST=hotel-management
      - HOTEL_MANAGEMENT_PORT=5000
      - TRIPS_ATOMIC_HOST=trips_atomic
      - TRIPS_ATOMIC_PORT=5000
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_started
      flight-management:
          condition: service_healthy


