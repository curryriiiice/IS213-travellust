services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  notifications:
    build:
      context: ./apps/notifications
      dockerfile: Dockerfile
    ports:
      - '5014:5000'
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  flight-search-wrapper:
    build:
      context: ./apps/flight-search-wrapper
      dockerfile: Dockerfile
    container_name: flight-search-wrapper
    ports:
      - '5003:5000'
    env_file:
      - .env
    environment:
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  saved-flights:
    build:
      context: ./apps/saved-flights
      dockerfile: Dockerfile
    container_name: saved-flights
    ports:
      - '5004:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SAVED_FLIGHTS_SUPABASE_URL}
      - SUPABASE_KEY=${SAVED_FLIGHTS_SUPABASE_KEY}
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  flight-management:
    build:
      context: ./apps/flight-management
      dockerfile: Dockerfile
    container_name: flight-management
    ports:
      - '5005:5000'
    env_file:
      - .env
    environment:
      - SEARCH_WRAPPER_HOST=flight-search-wrapper
      - SEARCH_WRAPPER_PORT=5000
      - SAVED_FLIGHTS_HOST=saved-flights
      - SAVED_FLIGHTS_PORT=5000
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      flight-search-wrapper:
        condition: service_healthy
      saved-flights:
        condition: service_healthy

  trips_atomic:
    build:
      context: ./apps/trips_atomic
      dockerfile: Dockerfile
    ports:
      - '5001:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${TRIPS_SUPABASE_URL}
      - SUPABASE_KEY=${TRIPS_SUPABASE_KEY}

  attractions:
    build:
      context: ./apps/attractions
      dockerfile: Dockerfile
    ports:
      - '5002:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${ATTRACTIONS_SUPABASE_URL}
      - SUPABASE_KEY=${ATTRACTIONS_SUPABASE_KEY}

  hotel-search-wrapper:
    build:
      context: ./apps/hotel-search-wrapper
      dockerfile: Dockerfile
    ports:
      - '5007:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${HOTELS_SUPABASE_URL}
      - SUPABASE_KEY=${HOTELS_SUPABASE_KEY}
      - FLASK_PORT=5000
    command:
      [
        'python',
        '-m',
        'flask',
        '--app',
        'hotel_search_wrapper_app',
        'run',
        '--host=0.0.0.0',
      ]

  saved-hotels:
    build:
      context: ./apps/saved-hotels
      dockerfile: Dockerfile
    ports:
      - '5008:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${HOTELS_SUPABASE_URL}
      - SUPABASE_KEY=${HOTELS_SUPABASE_KEY}
      - FLASK_PORT=5000
    command:
      [
        'python',
        '-m',
        'flask',
        '--app',
        'saved_hotels_app',
        'run',
        '--host=0.0.0.0',
      ]

  hotel-management:
    build:
      context: ./apps/hotel-management
      dockerfile: Dockerfile
    ports:
      - '5009:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${HOTELS_SUPABASE_URL}
      - SUPABASE_KEY=${HOTELS_SUPABASE_KEY}
      - FLASK_PORT=5000
    command:
      [
        'python',
        '-u',
        'hotel_management/hotel_management_app.py',
      ]

  booked_tickets:
    build:
      context: ./apps/booked_tickets
      dockerfile: Dockerfile
    ports:
      - '5006:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${BOOKED_TICKETS_SUPABASE_URL}
      - SUPABASE_KEY=${BOOKED_TICKETS_SUPABASE_KEY}

  book-hotels:
    build:
      context: ./apps/book-hotels
      dockerfile: Dockerfile
    ports:
      - '5012:5000'
    env_file:
      - .env
    environment:
      - TRIPS_ATOMIC_URL=http://trips_atomic:5000
      - HOTEL_MANAGEMENT_URL=http://hotel-management:5000
      - BOOKED_TICKETS_URL=http://booked_tickets:5000
      - AMQP_URL=${BOOK_HOTELS_AMQP_URL}
      - AMQP_EXCHANGE=${BOOK_HOTELS_AMQP_EXCHANGE}
      - AMQP_ROUTING_KEY_ACTIVITY=${BOOK_HOTELS_AMQP_ROUTING_KEY_ACTIVITY}
      - AMQP_ROUTING_KEY_ERROR=${BOOK_HOTELS_AMQP_ROUTING_KEY_ERROR}
    command:
      [
        'python',
        '-m',
        'flask',
        '--app',
        'book_hotels.book_hotels_app',
        'run',
        '--host=0.0.0.0',
      ]

  collaboration_service:
    build:
      context: ./apps/collaboration_service
      dockerfile: Dockerfile
    container_name: collaboration_service
    ports:
      - '5010:5000'
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${TRIPS_SUPABASE_URL}
      - SUPABASE_KEY=${TRIPS_SUPABASE_KEY}
      - PORT=5000
    depends_on:
      - redis
